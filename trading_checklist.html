<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trading Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Vazirmatn',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:16px}
.app{max-width:800px;margin:0 auto}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:4px}
.tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;color:#7d8590;transition:all .15s}
.tab.active{background:#21262d;color:#f0f6fc}
.page{display:none}.page.active{display:block}
.ok{color:#3fb950}.warn{color:#d29922}.bad{color:#f85149}
.bg-ok{background:rgba(63,185,80,.1);border-color:#2ea043!important}
.bg-warn{background:rgba(210,153,34,.1);border-color:#9e6a03!important}
.bg-bad{background:rgba(248,81,73,.1);border-color:#da3633!important}
.btn{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-family:'Vazirmatn',sans-serif;transition:all .15s}
.btn:hover{background:#30363d}
.btn.green{background:#238636;border-color:#2ea043;color:#fff}.btn.green:hover{background:#2ea043}
.btn.blue{background:#1f6feb;border-color:#388bfd;color:#fff}.btn.blue:hover{background:#388bfd}
.btn.red{background:transparent;border-color:#da3633;color:#f85149}.btn.red:hover{background:rgba(248,81,73,.08)}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;overflow:hidden;margin-bottom:10px}
.card-hdr{display:flex;align-items:center;padding:9px 13px;background:#1c2128;gap:8px}
.card-hdr-title{font-size:13px;font-weight:700;color:#f0f6fc;flex:1;cursor:pointer;user-select:none}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;background:#21262d;white-space:nowrap}
.prog{height:3px;background:#21262d}.prog-fill{height:3px;transition:width .3s}
.collapsed{display:none}
.two-col{display:grid;grid-template-columns:1fr 1fr}
.col-block{border-left:none}.col-block.no-border{border-left:none}
.col-hdr{font-size:10px;font-weight:700;color:#7d8590;padding:5px 12px 3px;background:#0d1117;border-top:1px solid #21262d;letter-spacing:.3px}
.row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid #161b22;cursor:pointer;outline:none;transition:background .1s}
.row:hover,.row:focus{background:#1c2128}
.tick{width:16px;height:16px;border:1.5px solid #30363d;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;transition:all .15s}
.tick.checked{background:#238636;border-color:#2ea043;color:#3fb950}
.row-text{font-size:11px;flex:1;line-height:1.4}
.row.done .row-text{color:#484f58;text-decoration:line-through;text-decoration-color:#30363d}
.phase-header{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;border-top:1px solid #21262d;background:#0d1117}
.phase-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px}
.phase-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.phase-num.p1{background:#1f3a5f;color:#4fc3f7}
.phase-num.p2{background:#1a3a1a;color:#3fb950}
.phase-num.p3{background:#3a1a2a;color:#ce93d8}
.phase-lock{font-size:11px;padding:2px 8px;border-radius:6px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-weight:600;border:1px solid #30363d;background:#21262d;color:#7d8590}
.phase-lock.locked{background:#2a0a0a;border-color:#da3633;color:#f85149}
.phase-body.locked-phase{opacity:0.4;pointer-events:none}
.day-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:6px;margin-bottom:10px}
.stat-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:8px 10px;text-align:center}
.stat-card .sl{font-size:10px;color:#7d8590;margin-bottom:2px}
.stat-card .sv{font-size:19px;font-weight:700}
.stat-card .ss{font-size:10px;color:#7d8590;margin-top:1px}
.verdict{text-align:center;padding:8px;border-radius:9px;font-size:12px;font-weight:600;margin-bottom:10px;border:1px solid #21262d}
.trade-card{background:#161b22;border:1px solid #21262d;border-radius:12px;overflow:hidden;margin-bottom:9px}
.trade-hdr{display:flex;align-items:center;padding:9px 13px;background:#1c2128;border-bottom:1px solid #21262d;gap:7px;flex-wrap:wrap}
.trade-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:9px 13px;border-bottom:1px solid #21262d}
.meta-f{display:flex;flex-direction:column;gap:3px}
.meta-f label{font-size:10px;color:#7d8590;font-weight:600}
.meta-f input,.meta-f select{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 7px;color:#e6edf3;font-size:12px;font-family:'Vazirmatn',sans-serif;outline:none;width:100%}
.meta-f input:focus,.meta-f select:focus{border-color:#388bfd}
.meta-f .calc{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:5px 7px;font-size:12px;font-weight:700;text-align:center}
.entry-method{padding:9px 13px;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.entry-method label{font-size:10px;color:#7d8590;font-weight:600;display:block;margin-bottom:5px}
.method-btns{display:flex;gap:5px;flex-wrap:wrap}
.method-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#7d8590;font-family:'Vazirmatn',sans-serif;transition:all .15s}
.method-btn.active{background:#1f6feb;border-color:#388bfd;color:#fff}
.method-note{flex:1;min-width:160px}
.method-note textarea{width:100%;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 7px;color:#e6edf3;font-size:11px;font-family:'Vazirmatn',sans-serif;outline:none;resize:none;height:36px}
.drawer{max-height:0;overflow:hidden;background:#0d1117;transition:max-height 0.3s ease}
.drawer.open{max-height:2000px;border-top:1px solid #21262d}
.drawer-inner{padding:10px 13px}
.rules-section{margin-bottom:12px}
.rules-section h4{font-size:12px;font-weight:700;color:#f5a623;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid #21262d}
.rule-item{font-size:12px;color:#e6edf3;padding:5px 0;border-bottom:1px solid #161b22;line-height:1.5}
.rule-item:last-child{border-bottom:none}
.rule-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:#21262d;color:#7d8590;margin-left:6px}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.week-nav button{background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:7px;padding:5px 12px;cursor:pointer;font-family:'Vazirmatn',sans-serif;font-size:12px}
.week-nav span{flex:1;text-align:center;font-size:13px;font-weight:600}
.w-table{width:100%;border-collapse:collapse;font-size:11px}
.w-table th{background:#161b22;padding:6px 8px;text-align:right;color:#7d8590;font-weight:600;border:1px solid #21262d}
.w-table td{padding:6px 8px;border:1px solid #21262d;text-align:right;vertical-align:middle}
.w-table tr:hover td{background:#1c2128}
.w-table .avg-row td{background:#161b22;font-weight:700}
.week-highlights{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.highlight-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:9px 12px}
.highlight-card .hl-day{font-size:10px;color:#7d8590;margin-bottom:2px}
.highlight-card .hl-score{font-size:21px;font-weight:700}
.w-block{margin-bottom:14px}
.w-block h3{font-size:13px;font-weight:700;color:#f0f6fc;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #21262d}
.jnl-card{background:#161b22;border:1px solid #21262d;border-radius:11px;overflow:hidden;margin-bottom:8px}
.jnl-card-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#1c2128;cursor:pointer;flex-wrap:wrap}
.jnl-card-hdr:hover{background:#21262d}
.jnl-body{display:none;padding:10px 13px;border-top:1px solid #21262d}
.jnl-body.open{display:block}
.jnl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-bottom:10px}
.jnl-field{background:#0d1117;border:1px solid #21262d;border-radius:7px;padding:7px 9px}
.jnl-field .jf-lbl{font-size:10px;color:#7d8590;margin-bottom:2px;font-weight:600}
.jnl-field .jf-val{font-size:12px;color:#e6edf3;font-weight:500}
.action-bar{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.settings-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:8px 12px}
.settings-bar label{font-size:11px;color:#7d8590;font-weight:600;white-space:nowrap}
.settings-bar input{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 8px;color:#e6edf3;font-size:12px;font-family:'Vazirmatn',sans-serif;outline:none;width:120px}
.account-display{font-size:13px;font-weight:700;color:#3fb950}
.empty{text-align:center;padding:30px;color:#7d8590;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:8px 20px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
</style>

<body>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('today')">📋 امروز</div>

  <div class="page" id="page-weekly">
    <div class="week-nav">

      <span id="weekLabel"></span>
      <button onclick="changeWeek(1)">بعدی ▶</button>
    </div>
    <div id="weekContent"></div>
  </div>
  <div class="page" id="page-edit">
    <p style="font-size:11px;color:#7d8590;margin-bottom:10px">آیتم‌هایی که نمیخوای رو حذف کن.</p>
    <button class="btn red" onclick="resetToDefault()" style="margin-bottom:12px">بازگشت به پیش‌فرض</button>

    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <input type="text" id="jnl-search" placeholder="جستجو Symbol..." oninput="renderJournal()" style="background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 10px;color:#e6edf3;font-size:12px;font-family:'Vazirmatn',sans-serif;outline:none;width:140px">
      <select id="jnl-filter" onchange="renderJournal()" style="background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 10px;color:#e6edf3;font-size:12px;font-family:'Vazirmatn',sans-serif;outline:none">
        <option value="">همه نتایج</option><option value="win">سود</option><option value="loss">ضرر</option>

function buildTwoCol(container,sections,stateObj,prefix,onchange,isPhased){
  container.innerHTML="";
  if(isPhased){
    const phases={};
    sections.forEach(sec=>{const p=sec.phase||1;if(!phases[p])phases[p]=[];phases[p].push(sec);});
    const phaseNames={1:"قبل از باکس",2:"داخل باکس",3:"مدیریت خروج"};
    const phaseColors={1:"p1",2:"p2",3:"p3"};
    const lockKey=prefix+"_lock";
    if(!(lockKey in window.phaseLocks))window.phaseLocks[lockKey]=true;
    Object.keys(phases).sort().forEach(ph=>{
      ph=parseInt(ph);
      const secs=phases[ph];if(!secs||!secs.length)return;
      const isLocked=()=>{if(!window.phaseLocks[lockKey])return false;if(ph===1)return false;const prevSecs=phases[ph-1]||[];return !prevSecs.every(sec=>sec.items.every(text=>stateObj[prefix+"::"+text]));};
      const phHdr=document.createElement("div");phHdr.className="phase-header";
      const lockBtn=document.createElement("button");
      lockBtn.id=prefix+"-lockbtn-"+ph;lockBtn.className="phase-lock"+(isLocked()?" locked":"");lockBtn.textContent=isLocked()?"🔒 قفل":"🔓 باز";
      lockBtn.onclick=(e)=>{e.stopPropagation();window.phaseLocks[lockKey]=!window.phaseLocks[lockKey];Object.keys(phases).sort().forEach(p=>{p=parseInt(p);const b=document.getElementById(prefix+"-lockbtn-"+p);const body=document.getElementById(prefix+"-phase-body-"+p);if(b&&body){const locked=p>1&&window.phaseLocks[lockKey]&&!phases[p-1].every(sec=>sec.items.every(text=>stateObj[prefix+"::"+text]));body.classList.toggle("locked-phase",locked);b.textContent=locked?"🔒 قفل":"🔓 باز";b.className="phase-lock"+(locked?" locked":"");}});};
      phHdr.innerHTML=`<div class="phase-title"><div class="phase-num ${phaseColors[ph]}">${ph}</div><span>${phaseNames[ph]||"مرحله "+ph}</span></div>`;
      phHdr.appendChild(lockBtn);container.appendChild(phHdr);
      const phBody=document.createElement("div");phBody.id=prefix+"-phase-body-"+ph;phBody.className="phase-body"+(isLocked()?" locked-phase":"");
      const left=document.createElement("div");left.className="col-block";
      const right=document.createElement("div");right.className="col-block";
      const grid=document.createElement("div");grid.className="two-col";grid.appendChild(left);grid.appendChild(right);
      secs.forEach(sec=>{
        const col=sec.col===1?right:left;
        sec.items.forEach(text=>{
          const key=prefix+"::"+text;if(!(key in stateObj))stateObj[key]=false;
          const row=document.createElement("div");row.className="row";row.tabIndex=0;
          const tid="t"+(++tickCounter);
          row.innerHTML=`<div class="tick" id="${tid}"></div><span class="row-text">${text}</span>`;
          const tog=()=>{stateObj[key]=!stateObj[key];const t=document.getElementById(tid);if(t){t.className="tick"+(stateObj[key]?" checked":"");t.textContent=stateObj[key]?"✓":"";}row.classList.toggle("done",stateObj[key]);onchange();Object.keys(phases).sort().forEach(p=>{p=parseInt(p);if(p===1)return;const prevSecs=phases[p-1]||[];const locked=window.phaseLocks[lockKey]&&!prevSecs.every(sec=>sec.items.every(t=>stateObj[prefix+"::"+t]));const b=document.getElementById(prefix+"-lockbtn-"+p);const body=document.getElementById(prefix+"-phase-body-"+p);if(body)body.classList.toggle("locked-phase",locked);if(b){b.textContent=locked?"🔒 قفل":"🔓 باز";b.className="phase-lock"+(locked?" locked":"");}});};
          row.addEventListener("click",tog);row.addEventListener("keydown",e=>{if(e.key===" "){e.preventDefault();tog();}});
          col.appendChild(row);
        });
      });
      phBody.appendChild(grid);container.appendChild(phBody);
    });
  }else{
    const left=document.createElement("div");left.className="col-block";
    const right=document.createElement("div");right.className="col-block";
    const grid=document.createElement("div");grid.className="two-col";grid.appendChild(left);grid.appendChild(right);
    sections.forEach(sec=>{
      const col=sec.col===1?right:left;
      if(sec.label){const lbl=document.createElement("div");lbl.className="col-hdr";lbl.textContent=sec.label;col.appendChild(lbl);}
      sec.items.forEach(text=>{
        const key=prefix+"::"+text;if(!(key in stateObj))stateObj[key]=false;

        const tid="t"+(++tickCounter);

        const tog=()=>{stateObj[key]=!stateObj[key];const t=document.getElementById(tid);if(t){t.className="tick"+(stateObj[key]?" checked":"");t.textContent=stateObj[key]?"✓":"";}row.classList.toggle("done",stateObj[key]);onchange();};
        row.addEventListener("click",tog);row.addEventListener("keydown",e=>{if(e.key===" "){e.preventDefault();tog();}});
        col.appendChild(row);
      });
    });
    container.appendChild(grid);
  }
}

function calcScore(stateObj,sections,prefix){let c=0,t=0;sections.forEach(sec=>sec.items.forEach(text=>{t++;if(stateObj[prefix+"::"+text])c++;}));return{checked:c,total:t,pct:t>0?c/t:0};}
function updBadge(bid,pid,pct){const b=document.getElementById(bid),p=document.getElementById(pid);if(b){b.textContent=Math.round(pct*100)+"%";b.className="badge "+colorC(pct);}if(p){p.style.width=Math.round(pct*100)+"%";p.style.background=fillC(pct);}}

function updateDayStats(){
  const pm=calcScore(preState,PREMARKET,"pm");
  const eod=calcScore(eodState,EOD,"eod");
  const trg=calcScore(trGlobalState,TRADE_CHECKLIST,"trg");
  updBadge("pm-badge","pm-prog",pm.pct);updBadge("eod-badge","eod-prog",eod.pct);updBadge("tr-global-badge","tr-global-prog",trg.pct);
  let tChk=pm.checked+eod.checked+trg.checked,tAll=pm.total+eod.total+trg.total;
  const acct=getAccountSize();
  const noTr=document.getElementById("no-trades");if(noTr)noTr.style.display=trades.length?"none":"block";
  let trScores=[];
  trades.forEach(t=>{
    const sc=calcScore(t.state,TRADE_CHECKLIST,"tr-"+t.id);
    tChk+=sc.checked;tAll+=sc.total;trScores.push(sc.pct);

    const res=parseFloat(t.resultDollar)||0,risk=parseFloat(t.riskDollar)||0;
    const R=risk>0?(res/risk).toFixed(2):"—",pct=acct>0?((res/acct)*100).toFixed(2):"—";
    const rd=document.getElementById("tres-r-"+t.id),pd=document.getElementById("tres-pct-"+t.id);
    if(rd){rd.textContent=R!=="—"?(R>0?"+":"")+R+"R":"—";rd.className="calc "+(res>0?"ok":res<0?"bad":"");}
    if(pd){pd.textContent=pct!=="—"?(pct>0?"+":"")+pct+"%":"—";pd.className="calc "+(res>0?"ok":res<0?"bad":"");}
  });
  const gp=tAll>0?tChk/tAll:0;
  const dayPnl=trades.reduce((a,t)=>a+(parseFloat(t.resultDollar)||0),0);
  const dayPnlPct=acct>0?((dayPnl/acct)*100).toFixed(2):"0";
  const stats=document.getElementById("dayStats");stats.innerHTML="";
  [{label:"🌅 آمادگی روز",pct:pm.pct,sub:`${pm.checked}/${pm.total}`},
   {label:"📊 معاملات",pct:trScores.length?trScores.reduce((a,b)=>a+b,0)/trScores.length:0,sub:`${trades.length} معامله`},
   {label:"🌙 پایان روز",pct:eod.pct,sub:`${eod.checked}/${eod.total}`},
   {label:"سود/ضرر روز",pct:dayPnl>=0?1:0,sub:(dayPnl>=0?"+":"")+dayPnl.toFixed(0)+"$ ("+dayPnlPct+"%)",noScore:true},
   {label:"کل امتیاز",pct:gp,sub:`${tChk}/${tAll}`,total:true},
  ].forEach(c=>{
    const d=document.createElement("div");d.className="stat-card"+(c.total?" total "+(gp>=1?"bg-ok":gp>=0.7?"bg-warn":"bg-bad"):"");
    if(c.noScore){d.innerHTML=`<div class="sl">${c.label}</div><div class="sv ${dayPnl>=0?"ok":"bad"}" style="font-size:14px;padding-top:3px">${c.sub}</div>`;}
    else{d.innerHTML=`<div class="sl">${c.label}</div><div class="sv ${colorC(c.pct)}">${Math.round(c.pct*100)}%</div><div class="ss">${c.sub}</div>`;}
    stats.appendChild(d);
  });
  const v=document.getElementById("verdict");
  if(gp>=1){v.textContent="✅ همه چک‌ها کامل";v.className="verdict bg-ok";}
  else if(gp>=0.85){v.textContent="🟡 تقریباً آماده";v.className="verdict bg-warn";}
  else{v.textContent="🔴 ستاپ کامل نیست — وارد نشو";v.className="verdict bg-bad";}
}

function saveDay(){
  const date=todayStr(),acct=getAccountSize();
  const pmSc=calcScore(preState,PREMARKET,"pm"),eodSc=calcScore(eodState,EOD,"eod");
  const tradeData=trades.map(t=>{const sc=calcScore(t.state,TRADE_CHECKLIST,"tr-"+t.id);const items=[];TRADE_CHECKLIST.forEach(sec=>sec.items.forEach(text=>{items.push({section:sec.label,item:text,checked:!!t.state["tr-"+t.id+"::"+text]});}));const res=parseFloat(t.resultDollar)||0,risk=parseFloat(t.riskDollar)||0;return{...t,score:sc,items,R:risk>0?parseFloat((res/risk).toFixed(2)):null,pctAccount:acct>0?parseFloat((res/acct*100).toFixed(2)):null};});
  const pmItems=[],eodItems=[];
  PREMARKET.forEach(sec=>sec.items.forEach(text=>{pmItems.push({item:text,checked:!!preState["pm::"+text]});}));
  EOD.forEach(sec=>sec.items.forEach(text=>{eodItems.push({item:text,checked:!!eodState["eod::"+text]});}));
  const tChk=pmSc.checked+eodSc.checked+tradeData.reduce((a,t)=>a+t.score.checked,0);
  const tAll=pmSc.total+eodSc.total+tradeData.reduce((a,t)=>a+t.score.total,0);
  const dayPnl=tradeData.reduce((a,t)=>a+(parseFloat(t.resultDollar)||0),0);
  const obj={date,saved:new Date().toISOString(),accountSize:acct,premarket:{score:pmSc,items:pmItems},eod:{score:eodSc,items:eodItems},trades:tradeData,total:{checked:tChk,total:tAll,pct:tAll>0?Math.round(tChk/tAll*100):0},dayPnl,balanceAfter:acct+dayPnl};

function getWeekDates(off){const now=new Date(),day=now.getDay();const sat=new Date(now);sat.setDate(now.getDate()-((day+1)%7)+(off*7));return Array.from({length:7},(_,i)=>{const d=new Date(sat);d.setDate(sat.getDate()+i);return d.toISOString().slice(0,10);});}
const DAY_FA=["شنبه","یکشنبه","دوشنبه","سه‌شنبه","چهارشنبه","پنجشنبه","جمعه"];

function renderWeekly(){
  const dates=getWeekDates(weekOffset);document.getElementById("weekLabel").textContent=dates[0]+" تا "+dates[6];
  const hist=JSON.parse(localStorage.getItem("tc_v3")||"{}");const week=dates.map(d=>hist[d]||null);const active=week.filter(d=>d);
  const el=document.getElementById("weekContent");if(!active.length){el.innerHTML=`<div class="empty">هیچ روزی ذخیره نشده</div>`;return;}
  const sorted=[...active].sort((a,b)=>b.total.pct-a.total.pct);const best=sorted[0],worst=sorted[sorted.length-1];const weekPnl=active.reduce((a,d)=>a+(d.dayPnl||0),0);
  let html=`<div class="week-highlights"><div class="highlight-card bg-ok"><div class="hl-day">🏆 بهترین — ${best.date}</div><div class="hl-score ok">${best.total.pct}%</div></div><div class="highlight-card bg-bad"><div class="hl-day">📉 بدترین — ${worst.date}</div><div class="hl-score bad">${worst.total.pct}%</div></div></div>`;

  week.forEach((d,i)=>{
    if(!d){html+=`<tr><td style="color:#484f58">${DAY_FA[i]}</td><td colspan="4" style="color:#484f58;text-align:center">—</td></tr>`;return;}
    const pm=Math.round(d.premarket.score.pct*100),eod=Math.round(d.eod.score.pct*100),pnl=d.dayPnl||0;
    html+=`<tr><td>${DAY_FA[i]}<br><small style="color:#7d8590">${d.date}</small></td><td style="color:${fillC(pm/100)};font-weight:700">${pm}%</td><td style="color:${fillC(eod/100)};font-weight:700">${eod}%</td><td style="color:${fillC(d.total.pct/100)};font-weight:700">${d.total.pct}%</td><td style="color:${pnl>=0?"#3fb950":"#f85149"};font-weight:700">${pnl>=0?"+":""}${pnl.toFixed(0)}$</td></tr>`;
  });
  if(active.length>1){const avgTot=Math.round(active.reduce((a,d)=>a+d.total.pct,0)/active.length);html+=`<tr class="avg-row"><td>میانگین / جمع</td><td>—</td><td>—</td><td style="color:${fillC(avgTot/100)}">${avgTot}%</td><td style="color:${weekPnl>=0?"#3fb950":"#f85149"};font-weight:700">${weekPnl>=0?"+":""}${weekPnl.toFixed(0)}$</td></tr>`;}
  html+=`</tbody></table></div>`;
  const allTrades=active.flatMap(d=>d.trades.map(t=>({...t,date:d.date})));
  if(allTrades.length){
    html+=`<div class="w-block"><h3>معاملات هفته</h3><table class="w-table"><thead><tr><th>تاریخ</th><th>Symbol</th><th>سشن</th><th>جهت</th><th>روش</th><th>نتیجه $</th><th>R</th><th>%</th></tr></thead><tbody>`;
    allTrades.forEach(t=>{const res=parseFloat(t.resultDollar)||0;html+=`<tr><td>${t.date}</td><td style="font-weight:700">${t.symbol||"—"}</td><td>${t.session||"—"}</td><td>${t.direction}</td><td style="font-size:10px">${t.method||"—"}</td><td style="color:${res>0?"#3fb950":res<0?"#f85149":"#7d8590"};font-weight:700">${res>=0?"+":""}${res}$</td><td style="font-weight:700;color:${(t.R||0)>0?"#3fb950":(t.R||0)<0?"#f85149":"#7d8590"}">${t.R!==null?((t.R>0?"+":"")+t.R+"R"):"—"}</td><td style="color:${(t.pctAccount||0)>0?"#3fb950":(t.pctAccount||0)<0?"#f85149":"#7d8590"}">${t.pctAccount!==null?((t.pctAccount>0?"+":"")+t.pctAccount+"%"):"—"}</td></tr>`;});
    html+=`</tbody></table></div>`;
  }

  const losses=allTrades.filter(t=>parseFloat(t.resultDollar||0)<0).length;

  const totalR=allTrades.filter(t=>t.R).reduce((a,t)=>a+(t.R||0),0);

  const list=document.getElementById("jnl-list");list.innerHTML="";

    const card=document.createElement("div");card.className="jnl-card";

    hdr.innerHTML=`<span style="font-size:14px;font-weight:700;color:#f0f6fc">${t.symbol||"—"}</span><span style="font-size:11px;padding:2px 7px;border-radius:6px;background:#21262d;color:#7d8590">${t.direction}</span>${t.session?`<span style="font-size:10px;color:#7d8590">${t.session}</span>`:""}<span style="font-size:11px;color:#7d8590">${t.date}</span>${t.method?`<span style="font-size:10px;padding:2px 7px;border-radius:6px;background:#1f2d1f;color:#3fb950">${t.method}</span>`:""}<span style="font-size:13px;font-weight:700;margin-right:auto;color:${resColor}">${resText}</span>`;
    const body=document.createElement("div");body.className="jnl-body";body.id="jnl-body-"+idx;
    const fields=[{l:"TF",v:t.tf},{l:"TP",v:t.tp},{l:"OB Type",v:t.obType},{l:"Confidence",v:t.confidence},{l:"Emotion",v:t.emotion},{l:"توضیح ورود",v:t.methodNote}].filter(f=>f.v);
    let bodyHtml=`<div class="jnl-grid">`;fields.forEach(f=>{bodyHtml+=`<div class="jnl-field"><div class="jf-lbl">${f.l}</div><div class="jf-val">${f.v}</div></div>`;});bodyHtml+=`</div>`;

    if(imgs.length){bodyHtml+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:10px">`;imgs.forEach(img=>{bodyHtml+=`<div style="border:1px solid #21262d;border-radius:8px;overflow:hidden"><div style="font-size:10px;color:#7d8590;padding:4px 8px;background:#0d1117">${img.label}</div><img src="${img.url}" style="width:100%;max-height:180px;object-fit:cover;display:block;cursor:pointer" onclick="window.open('${img.url}','_blank')" onerror="this.parentElement.style.display='none'"></div>`;});bodyHtml+=`</div>`;}

function buildEOD(container,sections,stateObj,prefix,onchange){
  container.innerHTML="";
  const groupTitles=["بررسی معامله","ژورنال"];
  const groups=[[sections[0],sections[1]],[sections[2],sections[3]]];
  groups.forEach((grp,gi)=>{
    // Full-width header
    const hdrDiv=document.createElement("div");
    hdrDiv.style.cssText="padding:5px 13px;background:#0d1117;border-top:1px solid #21262d;font-size:10px;font-weight:700;color:#7d8590;letter-spacing:.3px;grid-column:1/-1";
    hdrDiv.textContent=groupTitles[gi];
    container.appendChild(hdrDiv);
    const left=document.createElement("div");left.className="col-block no-border";
    const right=document.createElement("div");right.className="col-block no-border";
    const grid=document.createElement("div");grid.className="two-col";grid.appendChild(left);grid.appendChild(right);
    grp.forEach(sec=>{
      if(!sec)return;
      const col=sec.col===1?right:left;
      if(sec.spacer){for(let s=0;s<sec.spacer;s++){const sp=document.createElement("div");sp.style.cssText="padding:6px 12px;border-top:1px solid #161b22;background:#0d1117";col.appendChild(sp);}}
      sec.items.forEach(text=>{
        const key=prefix+"::"+text;if(!(key in stateObj))stateObj[key]=false;
        const row=document.createElement("div");row.className="row";row.tabIndex=0;
        const tid="t"+(++tickCounter);
        row.innerHTML=`<div class="tick" id="${tid}"></div><span class="row-text">${text}</span>`;
        const tog=()=>{stateObj[key]=!stateObj[key];const t=document.getElementById(tid);if(t){t.className="tick"+(stateObj[key]?" checked":"");t.textContent=stateObj[key]?"✓":"";}row.classList.toggle("done",stateObj[key]);onchange();};
        row.addEventListener("click",tog);row.addEventListener("keydown",e=>{if(e.key===" "){e.preventDefault();tog();}});
        col.appendChild(row);
      });
    });
    container.appendChild(grid);
  });
}

function restoreToday(dayData){
  preState={};if(dayData.premarket&&dayData.premarket.items){dayData.premarket.items.forEach(item=>{preState["pm::"+item.item]=item.checked;});}
  buildTwoCol(document.getElementById("pm-body"),PREMARKET,preState,"pm",updateDayStats);
  eodState={};if(dayData.eod&&dayData.eod.items){dayData.eod.items.forEach(item=>{eodState["eod::"+item.item]=item.checked;});}
  buildEOD(document.getElementById("eod-body"),EOD,eodState,"eod",updateDayStats);
  trades=[];tradeCounter=0;document.getElementById("trades-wrap").innerHTML='<div class="empty" id="no-trades">هنوز معامله‌ای ثبت نشده</div>';
  if(dayData.trades&&dayData.trades.length){
    dayData.trades.forEach(savedTrade=>{
      tradeCounter++;const id=tradeCounter;
      const trade={id,symbol:savedTrade.symbol||"EURUSD",tf:savedTrade.tf||"M1",session:savedTrade.session||"",boxPos:savedTrade.boxPos||"",entryTime:savedTrade.entryTime||"",exitTime:savedTrade.exitTime||"",direction:savedTrade.direction||"Buy",resultDollar:savedTrade.resultDollar||"",riskDollar:savedTrade.riskDollar||"",method:savedTrade.method||"",methodNote:savedTrade.methodNote||"",tp:savedTrade.tp||"",obType:savedTrade.obType||"",confidence:savedTrade.confidence||"",emotion:savedTrade.emotion||"",mistakes:savedTrade.mistakes||"",notes:savedTrade.notes||"",imgBefore:savedTrade.imgBefore||"",imgTrigger:savedTrade.imgTrigger||"",imgAfter:savedTrade.imgAfter||"",state:{}};
      if(savedTrade.items){savedTrade.items.forEach(item=>{trade.state["tr-"+id+"::"+item.item]=item.checked;});}
      trades.push(trade);buildTradeCard(trade);
    });
  }
  updateDayStats();
}

async function supaSave(date,data){
  try{const checkRes=await fetch(SUPA_URL+"/rest/v1/checklist?date=eq."+date,{headers:SUPA_HEADERS});const existing=await checkRes.json();let res;if(existing&&existing.length>0){res=await fetch(SUPA_URL+"/rest/v1/checklist?date=eq."+date,{method:"PATCH",headers:{...SUPA_HEADERS,"Prefer":"return=minimal"},body:JSON.stringify({data})});}else{res=await fetch(SUPA_URL+"/rest/v1/checklist",{method:"POST",headers:{...SUPA_HEADERS,"Prefer":"return=minimal"},body:JSON.stringify({date,data})});}if(!res.ok)throw new Error(await res.text());showToast("☁️ روی سرور ذخیره شد");}catch(e){showToast("⚠️ ذخیره روی سرور ناموفق بود");console.error(e);}
}

buildEOD(document.getElementById("eod-body"),EOD,eodState,"eod",updateDayStats);

supaLoad();
